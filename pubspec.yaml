name: eco_impact_app
description: "An educational and research targeted app that tracks usage and calculates carbon footprint and the battery usage of social media apps."
publish_to: 'none'
version: 1.0.0

environment:
  # Require Dart/Flutter 3.6.0 or later, but below 4.0.0
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # fl_chart library (for charts)
  fl_chart: ^0.70.2

  # firebase_core library (for firebase)
  firebase_core: ^3.10.1

  # usage_stats library (for usage stats) updated on 05/12
  usage_stats: ^1.3.1
  shared_preferences: ^2.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  change_app_package_name: ^1.4.0
  rename_app: ^1.6.2
  flutter_launcher_icons: ^0.14.3

 

flutter:
  uses-material-design: true

